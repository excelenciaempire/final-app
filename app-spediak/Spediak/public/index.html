<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1E3A5F">
  <meta name="description" content="Spediak - AI-Powered Home Inspection Statements">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Spediak">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Spediak</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      /* pan-y: allow vertical scrolling only.
         Disables horizontal panning (hides sidebar/adjacent screens when zoomed)
         AND disables pinch-zoom at the CSS touch-action level. */
      touch-action: pan-y;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f8f9fa;
    }
    #root {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: pan-y;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }
    /* Loading indicator */
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1E3A5F;
    }
    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
    }
    .loading-text {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <div class="loading-text">Spediak</div>
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script>
    // Prevent pinch-to-zoom on iOS Safari so the off-screen drawer panel
    // cannot be revealed by panning after a zoom.

    // 1. Safari-specific gesture events (most reliable for pinch-zoom).
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend',    function(e) { e.preventDefault(); }, { passive: false });

    // 2. Multi-touch fallback (catches cases where gesture events don't fire).
    //    capture:true fires before React Native Web's own handlers.
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length > 1) { e.preventDefault(); }
    }, { passive: false, capture: true });
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) { e.preventDefault(); }
    }, { passive: false, capture: true });
  </script>
</body>
</html>
